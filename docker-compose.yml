services:
  postgres:
    image: postgres:18
    container_name: wardrobe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wardrobe
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - wardrobe_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wardrobe"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: wardrobe-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API (browser-reachable for image URLs)
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - wardrobe_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: wardrobe-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - wardrobe_keycloak_data:/opt/keycloak/data

  backend:
    build: ./backend
    container_name: wardrobe-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/wardrobe
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wardrobe
      AUTH_MODE: keycloak
      KEYCLOAK_ISSUER: http://localhost:8080/realms/wardrobe
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/wardrobe/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: wardrobe-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: wardrobe-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - backend
      - keycloak
    volumes:
      - ./frontend/src:/app/src

volumes:
  wardrobe_postgres_data:
  wardrobe_minio_data:
  wardrobe_keycloak_data:
