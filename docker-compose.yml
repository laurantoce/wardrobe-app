services:
  postgres:
    image: postgres:18
    container_name: wardrobe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wardrobe
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - wardrobe_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wardrobe"]
      interval: 5s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: wardrobe-garage
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    ports:
      - "3900:3900"   # S3 API
      - "3902:3902"   # public website endpoint for uploaded images
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: GKwardrobedev0000000000000000
      GARAGE_DEFAULT_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      GARAGE_DEFAULT_BUCKET: localhost
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - wardrobe_garage_meta:/var/lib/garage/meta
      - wardrobe_garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage-init:
    image: dxflrs/garage:v2.3.0
    container_name: wardrobe-garage-init
    restart: "no"
    command: /garage bucket website --allow localhost
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - wardrobe_garage_meta:/var/lib/garage/meta

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: wardrobe-keycloak
    restart: unless-stopped
    command: >
      start-dev --import-realm
      --spi-theme-static-max-age=-1
      --spi-theme-cache-themes=false
      --spi-theme-cache-templates=false
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
      - wardrobe_keycloak_data:/opt/keycloak/data

  keycloak-theme:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: wardrobe-keycloak-theme
    restart: "no"
    depends_on:
      - keycloak
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://keycloak:8080 \
          --realm master \
          --user admin \
          --password admin; do
          sleep 2
        done

        until /opt/keycloak/bin/kcadm.sh update realms/wardrobe \
          -s loginTheme=wardrobe; do
          sleep 2
        done

  backend:
    build: ./backend
    container_name: wardrobe-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/wardrobe
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      OBJECT_STORAGE_ENDPOINT: http://garage:3900
      OBJECT_STORAGE_PUBLIC_URL: http://localhost:3902
      OBJECT_STORAGE_ACCESS_KEY: GKwardrobedev0000000000000000
      OBJECT_STORAGE_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      OBJECT_STORAGE_BUCKET: localhost
      OBJECT_STORAGE_REGION: garage
      AUTH_MODE: keycloak
      KEYCLOAK_ISSUER: http://localhost:8080/realms/wardrobe
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/wardrobe/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: wardrobe-api
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      keycloak-theme:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: wardrobe-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_started
      keycloak-theme:
        condition: service_completed_successfully
    volumes:
      - ./frontend/src:/app/src

volumes:
  wardrobe_postgres_data:
  wardrobe_garage_meta:
  wardrobe_garage_data:
  wardrobe_keycloak_data:
